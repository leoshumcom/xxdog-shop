name = "xxdog-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "xxdog-db"
database_id = "2e31d20c-dee8-4fd8-a3e1-175301225ca6"

# R2 存储桶（暂不激活，后续通过 Dashboard 激活后添加）
# [[r2_buckets]]
# binding = "MEDIA"
# bucket_name = "xxdog-media"

# KV 命名空间
[[kv_namespaces]]
binding = "CART"
id = "f564f26fd9eb425aa99d98c9a4c5b0f2"

# 环境变量
[vars]
JWT_SECRET = "xxdog-jwt-secret-change-in-production"
ADMIN_EMAIL = "admin@xxdog.com"
